<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21 Days Abundance Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #333; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh; padding: 20px;
        }
        .container, .login-container {
            background: white; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px; max-width: 400px; width: 100%; text-align: center;
        }
        .login-container { display: flex; flex-direction: column; justify-content: center; margin-top: 50px; }
        h2 { color: #2c3e50; margin-bottom: 10px; font-size: 24px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        input[type="text"] {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; outline: none;
        }
        input[type="text"]:focus { border-color: #4facfe; }
        .btn {
            padding: 12px 20px; border: none; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; width: 100%;
        }
        .btn:hover { opacity: 0.9; }
        
        /* ट्रैकर की स्टाइलिंग */
        #trackerApp { display: none; } /* शुरुआत में ट्रैकर छुपा रहेगा */
        .progress-container {
            width: 100%; background-color: #e0e0e0;
            border-radius: 10px; margin-bottom: 20px; height: 15px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            width: 0%; transition: width 0.4s ease;
        }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-box {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            background-color: #f1f2f6; border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: all 0.3s ease; user-select: none; font-size: 14px; color: #57606f;
        }
        .day-box.completed { background: #2ed573; color: white; transform: scale(1.05); }
        .day-box.locked { opacity: 0.5; cursor: not-allowed; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background-color: #ff6b81; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px;}
    </style>
</head>
<body>

    <!-- लॉगिन स्क्रीन -->
    <div class="login-container" id="loginScreen">
        <h2>स्वागत है! ✨</h2>
        <p class="subtitle">21 दिन के मेनिफेस्टेशन ट्रैकर में अपना नाम दर्ज करें</p>
        <input type="text" id="usernameInput" placeholder="अपना नाम यहाँ लिखें..." autocomplete="off">
        <button class="btn" onclick="startTracking()">शुरू करें</button>
    </div>

    <!-- मेन ट्रैकर ऐप -->
    <div class="container" id="trackerApp">
        <div class="header-top">
            <h3 id="welcomeText" style="color: #4facfe; font-size: 18px;"></h3>
            <button class="logout-btn" onclick="logoutUser()">लॉगआउट</button>
        </div>

        <h2>21 दिन का ट्रैकर</h2>
        <p class="subtitle">अपनी आदतों को ट्रैक करें और लक्ष्य पूरा करें</p>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <p style="margin-bottom: 20px; font-weight: bold;" id="statusText">0 / 21 दिन पूरे हुए</p>

        <div class="grid" id="trackerGrid"></div>
    </div>

    <script>
        const totalDays = 21;
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx8_3vivpJyHYu-bzd0xLuwLrUyBikWgRKXSo0trTJ5B6p_JzGux22mNu_iOExdDqjSow/exec'; 

        let currentUser = localStorage.getItem('currentUser');
        let completedDays = [];
        let lastCheckedDate = '';

        // चेक करें कि यूज़र पहले से लॉगिन है या नहीं
        if (currentUser) {
            loadUserData();
        }

        // लॉगिन बटन का फंक्शन
        function startTracking() {
            const nameInput = document.getElementById('usernameInput').value.trim();
            if (nameInput === "") {
                alert("कृपया अपना नाम दर्ज करें!");
                return;
            }
            currentUser = nameInput;
            localStorage.setItem('currentUser', currentUser);
            loadUserData();
        }

        // यूज़र का डेटा लोड करने का फंक्शन
        function loadUserData() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('trackerApp').style.display = 'block';
            document.getElementById('welcomeText').innerText = `नमस्ते, ${currentUser}`;

            // हर यूज़र का डेटा उसके नाम से सेव होगा (जैसे: data_Nandu)
            completedDays = JSON.parse(localStorage.getItem(`habitData_${currentUser}`)) || [];
            lastCheckedDate = localStorage.getItem(`lastDate_${currentUser}`) || '';

            checkStreak();
            initTracker();
        }

        // लॉगआउट करने का फंक्शन
        function logoutUser() {
            localStorage.removeItem('currentUser');
            location.reload(); // पेज रिफ्रेश करें
        }

        // स्ट्रीक चेक (1 दिन मिस होने पर रीसेट)
        function checkStreak() {
            if (completedDays.length > 0 && lastCheckedDate !== '') {
                const today = new Date();
                today.setHours(0, 0, 0, 0); 
                const lastDate = new Date(lastCheckedDate);
                lastDate.setHours(0, 0, 0, 0); 

                const diffTime = today.getTime() - lastDate.getTime();
                const diffDays = diffTime / (1000 * 3600 * 24);

                if (diffDays > 1) {
                    alert(`ओह नो ${currentUser}! आपने एक दिन मिस कर दिया। आपको फिर से दिन 1 से शुरू करना होगा।`);
                    completedDays = [];
                    lastCheckedDate = '';
                    saveLocalData();
                    saveDataToSheet();
                }
            }
        }

        function initTracker() {
            const grid = document.getElementById('trackerGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= totalDays; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.classList.add('day-box');
                dayDiv.innerText = i;
                
                if (completedDays.includes(i)) {
                    dayDiv.classList.add('completed');
                } else if (i > completedDays.length + 1) {
                    dayDiv.classList.add('locked');
                }

                dayDiv.addEventListener('click', () => toggleDay(i, dayDiv));
                grid.appendChild(dayDiv);
            }
            updateProgress();
        }

        function toggleDay(dayNumber, element) {
            const todayISO = new Date().toISOString(); 
            const todayStr = new Date().toDateString();
            let lastCheckedStr = lastCheckedDate ? new Date(lastCheckedDate).toDateString() : "";

            if (completedDays.includes(dayNumber)) {
                if (dayNumber === completedDays.length && lastCheckedStr === todayStr) {
                    completedDays.pop();
                    lastCheckedDate = ''; 
                } else {
                    alert("आप पुराने दिनों को नहीं हटा सकते!");
                    return;
                }
            } else {
                if (dayNumber !== completedDays.length + 1) {
                    alert(`क्रम से चलें! आपका अगला दिन Day ${completedDays.length + 1} है।`);
                    return;
                }
                if (lastCheckedStr === todayStr) {
                    alert("आज का टास्क पूरा हो गया है! कल वापस आएं।");
                    return;
                }
                
                completedDays.push(dayNumber);
                lastCheckedDate = todayISO;
            }
            
            saveLocalData();
            initTracker(); 
            saveDataToSheet();
        }

        // यूज़र के नाम से लोकल स्टोरेज में सेव करें
        function saveLocalData() {
            localStorage.setItem(`habitData_${currentUser}`, JSON.stringify(completedDays));
            localStorage.setItem(`lastDate_${currentUser}`, lastCheckedDate);
        }

        function updateProgress() {
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');
            const progressPercentage = (completedDays.length / totalDays) * 100;
            progressBar.style.width = progressPercentage + '%';
            statusText.innerText = `${completedDays.length} / ${totalDays} दिन पूरे हुए`;
        }

        // डेटा को Google Sheets पर यूज़र के नाम के साथ भेजें
        function saveDataToSheet() {
            const data = {
                username: currentUser, // यहाँ यूज़र का नाम जा रहा है
                totalCompleted: completedDays.length,
                daysArray: completedDays
            };

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(() => console.log('डेटा सेव हो गया!'))
            .catch(error => console.error('एरर:', error));
        }
    </script>
</body>
</html>
